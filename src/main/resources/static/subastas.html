<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear Subasta</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo">Alto Valor</div>
    <nav>
        <a href="subastas.html">Subastas</a>
        <a href="perfil.html">Perfil</a>
        <a href="#" onclick="logout()">Cerrar Sesión</a>
    </nav>
</header>

<section class="hero">
    <h1>Crear Subasta</h1>

    <form id="crearSubastaForm" class="formulario">
        <input type="text" id="tituloSubasta" placeholder="Título" required>
        <textarea id="descripcionSubasta" placeholder="Descripción" required></textarea>
        <input type="number" id="precioInicial" placeholder="Precio inicial" min="0.01" step="0.01" required>
        <label for="fechaFin">Fecha y hora de finalización</label>
        <input type="datetime-local" id="fechaFin" required>
        <button class="btn-principal" type="submit">Crear subasta</button>
    </form>
</section>

<script src="app.js"></script>
</body>
</html>
