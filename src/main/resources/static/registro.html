<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Registro</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <div class="logo">
        <img src="/img/martillo.png" alt="Martillo de subasta" class="logo-martillo">
        <span>Alto Valor</span>
    </div> 

    <nav>
        <a href="index.html">Inicio</a>
        <a href="login.html">Ingresar</a>
    </nav>
</header>

<section class="hero">

    <h1>Crear Cuenta</h1>

    <form id="registroForm" class="formulario">

        <input type="text" id="nombre" placeholder="Nombre" required>
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Contraseña" required>
        <h1>Roles</h1>
        <label>
            <input type="checkbox" class="rolRegistro" value="COMPRADOR" checked>
            Comprador
        </label>
        <label>
            <input type="checkbox" class="rolRegistro" value="VENDEDOR">
            Vendedor
        </label>
        <button class="btn-principal" type="submit">Registrarme</button>

    </form>

</section>

<script src="app.js"></script>

</body>
</html>
